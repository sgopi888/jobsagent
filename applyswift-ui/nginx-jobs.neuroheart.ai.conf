server {
    listen 80;
    server_name jobs.neuroheart.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name jobs.neuroheart.ai;

    ssl_certificate /etc/letsencrypt/live/jobs.neuroheart.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jobs.neuroheart.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # All traffic goes to Next.js on port 3001
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
